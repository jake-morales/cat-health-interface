version: 0.0
os: linux
files:
  - source: /backend
    destination: /home/ec2-user/cat-health-interface/backend
hooks:
  BeforeInstall:
    - location: backend/scripts/stop_server.sh
      timeout: 60
      runas: ec2-user
    - location: backend/scripts/ensure_uv.sh
      timeout: 180
      runas: ec2-user
  AfterInstall:
    - location: backend/scripts/fix_backend_permissions.sh
      timeout: 60
      runas: root
    - location: backend/scripts/install_dependencies.sh
      timeout: 300
      runas: ec2-user
  ApplicationStart:
    - location: backend/scripts/start_server.sh
      timeout: 60
      runas: ec2-user
  ValidateService:
    - location: backend/scripts/validate_service.sh
      timeout: 60
      runas: ec2-user
